name: Render token synchronizer

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - scripts/sync-render-ingest-token.ps1
      - .github/workflows/render-token-sync.yml
      - docs/operations/render-token-sync.md
  push:
    branches:
      - develop
      - main
    paths:
      - scripts/sync-render-ingest-token.ps1
      - .github/workflows/render-token-sync.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Render token synchronizer
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Parse synchronizer
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path "scripts/sync-render-ingest-token.ps1"),
              [ref]$tokens,
              [ref]$errors
          ) | Out-Null

          if (@($errors).Count -gt 0) {
              $errors | Format-Table -AutoSize | Out-String | Write-Host
              throw "El sincronizador contiene errores de sintaxis PowerShell."
          }

      - name: Validate secret handling
        run: |
          $source = Get-Content "scripts/sync-render-ingest-token.ps1" -Raw

          $required = @(
              'INGEST_BEARER_TOKEN',
              '/env-vars/$encodedVariableName',
              'deploy_only',
              'Read-Host "Pega el API key de Render" -AsSecureString',
              'secrets\upstream-current.token',
              'Test-IngestAuthentication'
          )

          foreach ($entry in $required) {
              if (-not $source.Contains($entry)) {
                  throw "Falta el control requerido: $entry"
              }
          }

          if ($source -match '(?im)Write-(?:Host|Output|Verbose|Debug).*(?:ingestToken|renderApiKey|secureApiKey)') {
              throw "El sincronizador intenta imprimir una credencial."
          }

          if ($source.Contains('/services/$serviceId/env-vars"')) {
              throw "El sincronizador no debe reemplazar el conjunto completo de variables."
          }

      - name: Test authenticated probe
        run: |
          $tokens = $null
          $errors = $null
          $ast = [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path "scripts/sync-render-ingest-token.ps1"),
              [ref]$tokens,
              [ref]$errors
          )
          if (@($errors).Count -gt 0) {
              throw "No se pudo analizar el sincronizador."
          }

          foreach ($functionName in @("Test-IngestAuthentication")) {
              $functionAst = $ast.Find({
                  param($node)
                  $node -is [System.Management.Automation.Language.FunctionDefinitionAst] -and
                      $node.Name -eq $functionName
              }, $true)
              if ($null -eq $functionAst) {
                  throw "No se encontró $functionName."
              }
              & ([scriptblock]::Create($functionAst.Extent.Text))
          }

          function Start-ProbeServer {
              param(
                  [int]$Port,
                  [int]$StatusCode,
                  [string]$ExpectedToken
              )

              return Start-Job -ArgumentList $Port, $StatusCode, $ExpectedToken -ScriptBlock {
                  param($Port, $StatusCode, $ExpectedToken)
                  $listener = [System.Net.HttpListener]::new()
                  $listener.Prefixes.Add("http://127.0.0.1:$Port/")
                  $listener.Start()
                  try {
                      $context = $listener.GetContext()
                      $authorization = $context.Request.Headers["Authorization"]
                      if ($authorization -ne "Bearer $ExpectedToken") {
                          $StatusCode = 401
                      }
                      $payload = if ($StatusCode -eq 401) {
                          '{"error":"unauthorized"}'
                      } else {
                          '{"error":"invalid_request"}'
                      }
                      $bytes = [System.Text.Encoding]::UTF8.GetBytes($payload)
                      $context.Response.StatusCode = $StatusCode
                      $context.Response.ContentType = "application/json"
                      $context.Response.ContentLength64 = $bytes.Length
                      $context.Response.OutputStream.Write($bytes, 0, $bytes.Length)
                      $context.Response.Close()
                  }
                  finally {
                      $listener.Stop()
                      $listener.Close()
                  }
              }
          }

          $token = "0123456789abcdef0123456789abcdef"

          $acceptedServer = Start-ProbeServer -Port 18791 -StatusCode 400 -ExpectedToken $token
          Start-Sleep -Milliseconds 500
          $accepted = Test-IngestAuthentication -BaseUrl "http://127.0.0.1:18791" -Token $token
          Wait-Job $acceptedServer | Out-Null
          Receive-Job $acceptedServer | Out-Null
          Remove-Job $acceptedServer

          if (-not $accepted.authentication_accepted -or $accepted.status_code -ne 400) {
              throw "La sonda no reconoció una autenticación aceptada."
          }

          $rejectedServer = Start-ProbeServer -Port 18792 -StatusCode 401 -ExpectedToken "different-token"
          Start-Sleep -Milliseconds 500
          $rejected = $false
          try {
              Test-IngestAuthentication -BaseUrl "http://127.0.0.1:18792" -Token $token | Out-Null
          }
          catch {
              $rejected = $_.Exception.Message -match 'HTTP 401'
          }
          Wait-Job $rejectedServer | Out-Null
          Receive-Job $rejectedServer | Out-Null
          Remove-Job $rejectedServer

          if (-not $rejected) {
              throw "La sonda no rechazó correctamente un token inválido."
          }
