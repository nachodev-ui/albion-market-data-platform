name: Receiver performance smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
    paths:
      - apps/collector/internal/httpingest/**
      - apps/collector/internal/normalization/**
      - apps/collector/internal/storage/**
      - apps/collector/internal/upstream/**
      - scripts/benchmark-receiver.ps1
      - .github/workflows/performance.yml

permissions:
  contents: read

concurrency:
  group: receiver-performance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-smoke:
    name: Benchmark smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/collector/go.mod
          cache-dependency-path: apps/collector/go.sum

      - name: Run receiver benchmark smoke
        run: >-
          go test
          -run '^$'
          -bench 'Benchmark(CaptureOrders|NormalizeOrders|NormalizeHistory68Buckets|AppendOrders|AppendHistory68Buckets|ReadPrices|ReadHistory68Buckets|SerializePrices|OutboxEnqueuePrices|OutboxRestart)(1000|10000)?$'
          -benchtime 1x
          -benchmem
          -count 1
          ./apps/collector/internal/httpingest
          ./apps/collector/internal/normalization
          ./apps/collector/internal/storage/normalizedjsonl
          ./apps/collector/internal/storage/localdb
          ./apps/collector/internal/upstream

      - name: Verify outage recovery metrics
        run: go test -run 'TestPerformanceBaselineOutboxRecovery$' -v ./apps/collector/internal/upstream
