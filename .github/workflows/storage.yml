name: Storage durability

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - apps/collector/cmd/receiver/**
      - apps/collector/cmd/storagectl/**
      - apps/collector/internal/instancelock/**
      - apps/collector/internal/storage/**
      - apps/collector/internal/upstream/**
      - scripts/backup-local-storage.ps1
      - scripts/verify-local-storage-backup.ps1
      - scripts/restore-local-storage.ps1
      - .github/workflows/storage.yml
  push:
    branches:
      - develop
      - main
    paths:
      - apps/collector/cmd/receiver/**
      - apps/collector/cmd/storagectl/**
      - apps/collector/internal/instancelock/**
      - apps/collector/internal/storage/**
      - apps/collector/internal/upstream/**
      - scripts/backup-local-storage.ps1
      - scripts/verify-local-storage-backup.ps1
      - scripts/restore-local-storage.ps1
      - .github/workflows/storage.yml

permissions:
  contents: read

concurrency:
  group: storage-durability-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  durability:
    name: Durability on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/collector

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/collector/go.mod
          cache-dependency-path: apps/collector/go.sum

      - name: Test durable storage and restart recovery
        run: go test -count=1 -timeout 120s ./internal/storage/durable ./internal/storage/backup ./internal/instancelock ./internal/upstream ./cmd/receiver

      - name: Build receiver
        run: go build ./cmd/receiver

      - name: Build storage control tool
        run: go build ./cmd/storagectl
