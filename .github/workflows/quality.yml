name: Go quality checks

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: go-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Go quality checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/collector

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Reject committed secret files
        shell: bash
        working-directory: .
        run: |
          forbidden="$(git ls-files | grep -E '(^|/)\.env($|\.)|(^|/)secrets/|\.(token|secret)$' | grep -Ev '(^|/)\.env\.example$' || true)"
          if [[ -n "$forbidden" ]]; then
            printf 'Forbidden secret-bearing files are tracked:\n%s\n' "$forbidden"
            exit 1
          fi
          if git grep -nE -e '-----BEGIN ([A-Z ]+ )?PRIVATE KEY-----' -- . ':!*.md'; then
            echo 'A private key marker was found in tracked source files.'
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/collector/go.mod
          cache-dependency-path: apps/collector/go.sum

      - name: Verify formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            printf 'The following Go files are not formatted:\n%s\n' "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build receiver
        run: go build ./cmd/receiver
