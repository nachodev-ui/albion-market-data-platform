groups:
  - name: albion-receiver
    rules:
      - alert: AlbionReceiverUnavailable
        expr: up{job="albion-receiver"} == 0
        for: 2m
        labels:
          severity: page
          service: albion-market-data-platform
        annotations:
          summary: Receiver scrape target is unavailable
          description: Prometheus cannot scrape the local receiver.
          runbook_url: docs/RUNBOOK_RECEIVER_DEGRADED.md

      - alert: AlbionReceiverNoCaptures
        expr: sum(increase(albion_receiver_captures_received_total[30m])) == 0
        for: 30m
        labels:
          severity: warn
          service: albion-market-data-platform
        annotations:
          summary: Receiver has no recent captures
          description: No market capture payloads were observed recently.
          runbook_url: docs/RUNBOOK_RECEIVER_DEGRADED.md

      - alert: AlbionReceiverNormalizationErrors
        expr: sum(increase(albion_receiver_normalization_errors_total[10m])) > 0
        for: 5m
        labels:
          severity: warn
          service: albion-market-data-platform
        annotations:
          summary: Receiver normalization errors detected
          description: Some payloads could not be decoded or normalized.
          runbook_url: docs/RUNBOOK_RECEIVER_DEGRADED.md

      - alert: AlbionReceiverStorageErrors
        expr: sum(increase(albion_receiver_storage_errors_total[10m])) > 0
        for: 2m
        labels:
          severity: page
          service: albion-market-data-platform
        annotations:
          summary: Receiver storage errors detected
          description: Durable storage reported errors.
          runbook_url: docs/RUNBOOK_RECEIVER_DEGRADED.md

      - alert: AlbionReceiverStorageUsageHigh
        expr: albion_receiver_storage_bytes{area="total"} / albion_receiver_storage_max_bytes > 0.85
        for: 10m
        labels:
          severity: warn
          service: albion-market-data-platform
        annotations:
          summary: Receiver storage usage is high
          description: Local receiver data is using more than 85 percent of its configured storage budget.
          runbook_url: docs/RUNBOOK_RECEIVER_DEGRADED.md

      - alert: AlbionReceiverOutboxNearCapacity
        expr: albion_receiver_outbox_capacity > 0 and albion_receiver_outbox_depth / albion_receiver_outbox_capacity > 0.90
        for: 5m
        labels:
          severity: warn
          service: albion-market-data-platform
        annotations:
          summary: Receiver outbox is near capacity
          description: The persistent outbox is above 90 percent capacity for at least one pipeline.
          runbook_url: docs/RUNBOOK_RECEIVER_DEGRADED.md

      - alert: AlbionReceiverForwarderStopped
        expr: albion_receiver_forwarder_enabled == 1 and albion_receiver_forwarder_running == 0
        for: 2m
        labels:
          severity: page
          service: albion-market-data-platform
        annotations:
          summary: Enabled receiver forwarder is not running
          description: A configured price or history forwarder is enabled but not running.
          runbook_url: docs/RUNBOOK_RECEIVER_DEGRADED.md

      - alert: AlbionReceiverForwarderDegraded
        expr: albion_receiver_forwarder_status{status="degraded"} == 1
        for: 5m
        labels:
          severity: warn
          service: albion-market-data-platform
        annotations:
          summary: Receiver forwarder is degraded
          description: A forwarder reports degraded state.
          runbook_url: docs/RUNBOOK_RECEIVER_DEGRADED.md

      - alert: AlbionReceiverOldPendingOutbox
        expr: albion_receiver_outbox_oldest_pending_age_seconds > 900
        for: 5m
        labels:
          severity: warn
          service: albion-market-data-platform
        annotations:
          summary: Receiver outbox has old pending batches
          description: The oldest pending outbox batch is older than 15 minutes.
          runbook_url: docs/RUNBOOK_RECEIVER_DEGRADED.md
